name: Deploy docs to GitHub Pages

# This repo is a read-only mirror: opus-125/core builds the Vite docs site and
# syncs the pre-built static output (index.html + assets/) into this repo's root.
# So there is nothing to build here — just publish the static files to Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          mkdir _site
          rsync -a --exclude='.git' --exclude='.github' --exclude='_site' ./ _site/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
